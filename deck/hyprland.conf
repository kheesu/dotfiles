# hyprland.conf — Quickshell "Pebbles" integration
# ─────────────────────────────────────────────────────────────────────────────
# Add these blocks to your existing hyprland.conf (or source this file).
# Assumes Quickshell is started as part of your exec-once chain and that
# your config file lives at  ~/.config/quickshell/shell.qml
# ─────────────────────────────────────────────────────────────────────────────

# ── autostart ────────────────────────────────────────────────────────────────
exec-once = ~/.local/bin/quickshell-pebbles

# ── reserved gap for the bar (52 px) ─────────────────────────────────────────
# Quickshell sets WlrLayerShell.exclusiveZone = height automatically, so
# Hyprland respects it.  If you use gaps_out you may want to bump the
# top value to account for the extra visual breathing room.
general {
    gaps_in  = 6
    gaps_out = 10,10,10,10   # top,right,bottom,left  (bar handles its own top gap)
    border_size = 2
    col.active_border   = rgba(c4a7e7ff)   # Rose Pine iris
    col.inactive_border = rgba(403d52ff)   # Rose Pine hlMed
}

# ── keybinds — shell panels ───────────────────────────────────────────────────
# Quickshell listens on its IPC socket; quickshell ipc sends a named message.

# App launcher  (Super + Space  or  Super + D  — pick one)
bind = SUPER,       SPACE,  exec, quickshell ipc launcher
bind = SUPER,       D,      exec, quickshell ipc launcher

# Quick settings  (Super + S)
bind = SUPER,       S,      exec, quickshell ipc quicksettings

# Calendar        (Super + C)
bind = SUPER,       C,      exec, quickshell ipc calendar

# ── workspace navigation ──────────────────────────────────────────────────────
# The Workspaces pebble calls HyprlandIpc.dispatch("workspace N") directly.
# These keyboard shortcuts remain useful for power users.
bind = SUPER,       1, workspace, 1
bind = SUPER,       2, workspace, 2
bind = SUPER,       3, workspace, 3
bind = SUPER,       4, workspace, 4
bind = SUPER,       5, workspace, 5
bind = SUPER,       6, workspace, 6
bind = SUPER,       7, workspace, 7
bind = SUPER,       8, workspace, 8
bind = SUPER,       9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

bind = SUPER,       TAB,     workspace, e+1
bind = SUPER SHIFT, TAB,     workspace, e-1

# ── window management ─────────────────────────────────────────────────────────
bind = SUPER,       Q,       killactive
bind = SUPER,       F,       fullscreen, 0
bind = SUPER SHIFT, F,       fullscreen, 1          # maximise
bind = SUPER,       V,       togglefloating
bind = SUPER,       P,       pseudo

# Focus movement
bind = SUPER,       H,       movefocus, l
bind = SUPER,       L,       movefocus, r
bind = SUPER,       K,       movefocus, u
bind = SUPER,       J,       movefocus, d

# Window resize
binde = SUPER ALT,  H,       resizeactive, -40 0
binde = SUPER ALT,  L,       resizeactive,  40 0
binde = SUPER ALT,  K,       resizeactive,  0 -40
binde = SUPER ALT,  J,       resizeactive,  0  40

# ── volume (mirrors the Tray pebble slider) ───────────────────────────────────
binde = ,   XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = ,   XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind  = ,   XF86AudioMute,         exec, pactl set-sink-mute   @DEFAULT_SINK@ toggle
bind  = ,   XF86AudioMicMute,      exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# ── brightness ────────────────────────────────────────────────────────────────
binde = ,   XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde = ,   XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── screenshot ────────────────────────────────────────────────────────────────
bind = ,         Print,       exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT,    Print,       exec, grim ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S).png

# ── application shortcuts ─────────────────────────────────────────────────────
bind = SUPER,       Return,   exec, kitty
bind = SUPER,       E,        exec, nautilus
bind = SUPER,       B,        exec, firefox
bind = SUPER SHIFT, L,        exec, hyprlock

# ── theming ───────────────────────────────────────────────────────────────────
decoration {
    rounding = 12
    blur {
        enabled     = true
        size        = 8
        passes      = 2
        new_optimizations = true
        xray        = false
    }
    drop_shadow       = true
    shadow_range      = 20
    shadow_render_power = 3
    col.shadow        = rgba(00000088)
}

animations {
    enabled = true
    bezier  = snappy,   0.25, 1, 0.5,  1
    bezier  = easeOut,  0.0,  0, 0.25, 1

    animation = windows,        1, 3, snappy,  slide
    animation = windowsOut,     1, 2, easeOut, slide
    animation = border,         1, 5, default
    animation = fade,           1, 3, default
    animation = workspaces,     1, 3, snappy,  slidevert
}

input {
    kb_layout    = us
    follow_mouse = 1
    touchpad {
        natural_scroll    = true
        disable_while_typing = true
        tap-to-click      = true
    }
    sensitivity = 0
}

misc {
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
}
