# hyprland.conf — Steam Deck (Quickshell "Pebbles" integration)
# ─────────────────────────────────────────────────────────────────────────────
# Keyboard-centric philosophy: every operation is reachable without a mouse.
# Primary modifier (SUPER / Mod4) owns window management and workspaces.
# Alt (Mod1) owns resize so the two layers never conflict.
# App launchers live on Super+[key] — just like the sway reference config.
# ─────────────────────────────────────────────────────────────────────────────

# ── autostart ─────────────────────────────────────────────────────────────────
exec-once = ~/.local/bin/quickshell-pebbles

# ── modifiers ─────────────────────────────────────────────────────────────────
$mainMod = SUPER

# ── aesthetics (Catppuccin Mocha + glassmorphism) ─────────────────────────────
general {
    gaps_in  = 5
    gaps_out = 15

    border_size = 2
    col.active_border   = rgb(cba6f7) rgb(89b4fa) 45deg   # Mauve → Blue
    col.inactive_border = rgb(1e1e2e)

    layout = dwindle
}

decoration {
    rounding = 12

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        new_optimizations = true
        xray              = false
    }

    drop_shadow        = true
    shadow_range       = 20
    shadow_render_power = 3
    col.shadow         = rgba(00000088)
}

animations {
    enabled = true

    bezier = snappy,  0.25, 1,    0.5,  1
    bezier = popIn,   0.05, 0.9,  0.1,  1.05
    bezier = easeOut, 0.0,  0,    0.25, 1

    animation = windows,    1, 5, popIn,   slide
    animation = windowsOut, 1, 3, easeOut, slide
    animation = border,     1, 8, default
    animation = fade,       1, 5, default
    animation = workspaces, 1, 4, snappy,  slidevert
}

dwindle {
    pseudotile     = yes
    preserve_split = yes
}

# ── input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
    }
}

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
}

# ── keybinds — applications ───────────────────────────────────────────────────
# Super+[key] launches apps, matching the sway config's Super-for-apps pattern.
bind = $mainMod,       RETURN, exec, kitty
bind = $mainMod,       B,      exec, firefox
bind = $mainMod,       E,      exec, nautilus
bind = $mainMod,       O,      exec, obsidian
bind = $mainMod,       D,      exec, discord

# ── keybinds — shell panels (Quickshell IPC) ──────────────────────────────────
bind = $mainMod,       SPACE,  exec, quickshell ipc launcher
bind = $mainMod,       S,      exec, quickshell ipc quicksettings
bind = $mainMod,       G,      exec, quickshell ipc calendar

# ── keybinds — window control ─────────────────────────────────────────────────
bind = $mainMod,       Q,      killactive
bind = $mainMod,       F,      fullscreen, 0
bind = $mainMod SHIFT, F,      fullscreen, 1        # maximise
bind = $mainMod,       V,      togglefloating
bind = $mainMod,       P,      pseudo                # dwindle pseudo-tile
bind = $mainMod SHIFT, L,      exec, hyprlock

# ── keybinds — vim-style focus (hjkl) ────────────────────────────────────────
bind = $mainMod,       H,      movefocus, l
bind = $mainMod,       L,      movefocus, r
bind = $mainMod,       K,      movefocus, u
bind = $mainMod,       J,      movefocus, d

# ── keybinds — vim-style window swap (Shift+hjkl) ────────────────────────────
# Mirrors sway: "mark swap, focus dir, swap container with mark swap"
bind = $mainMod SHIFT, H,      swapwindow, l
bind = $mainMod SHIFT, L,      swapwindow, r
bind = $mainMod SHIFT, K,      swapwindow, u
bind = $mainMod SHIFT, J,      swapwindow, d

# ── keybinds — resize (Alt+hjkl, repeatable) ─────────────────────────────────
# Alt layer keeps resize separate from focus so there is no modal state to track.
binde = ALT,           H,      resizeactive, -30 0
binde = ALT,           L,      resizeactive,  30 0
binde = ALT,           K,      resizeactive,  0 -30
binde = ALT,           J,      resizeactive,  0  30

# ── keybinds — workspace navigation (1–10) ────────────────────────────────────
bind = $mainMod,       1,  workspace, 1
bind = $mainMod,       2,  workspace, 2
bind = $mainMod,       3,  workspace, 3
bind = $mainMod,       4,  workspace, 4
bind = $mainMod,       5,  workspace, 5
bind = $mainMod,       6,  workspace, 6
bind = $mainMod,       7,  workspace, 7
bind = $mainMod,       8,  workspace, 8
bind = $mainMod,       9,  workspace, 9
bind = $mainMod,       0,  workspace, 10

bind = $mainMod SHIFT, 1,  movetoworkspace, 1
bind = $mainMod SHIFT, 2,  movetoworkspace, 2
bind = $mainMod SHIFT, 3,  movetoworkspace, 3
bind = $mainMod SHIFT, 4,  movetoworkspace, 4
bind = $mainMod SHIFT, 5,  movetoworkspace, 5
bind = $mainMod SHIFT, 6,  movetoworkspace, 6
bind = $mainMod SHIFT, 7,  movetoworkspace, 7
bind = $mainMod SHIFT, 8,  movetoworkspace, 8
bind = $mainMod SHIFT, 9,  movetoworkspace, 9
bind = $mainMod SHIFT, 0,  movetoworkspace, 10

bind = $mainMod,       TAB,    workspace, e+1
bind = $mainMod SHIFT, TAB,    workspace, e-1

# ── keybinds — scratchpad ─────────────────────────────────────────────────────
bind = $mainMod,       MINUS,  togglespecialworkspace, magic
bind = $mainMod SHIFT, MINUS,  movetoworkspace, special:magic

# ── keybinds — wallpaper cycle (Super+J/K, mirrors sway's Mod4+j/k) ──────────
bind = $mainMod CTRL,  J,      exec, ~/dotfiles/scripts/cycle_wallpaper.sh next
bind = $mainMod CTRL,  K,      exec, ~/dotfiles/scripts/cycle_wallpaper.sh prev

# ── keybinds — volume ─────────────────────────────────────────────────────────
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind  = , XF86AudioMute,        exec, pactl set-sink-mute   @DEFAULT_SINK@ toggle
bind  = , XF86AudioMicMute,     exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind  = , XF86AudioPlay,        exec, playerctl play-pause

# ── keybinds — brightness ────────────────────────────────────────────────────
binde = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── keybinds — screenshot ────────────────────────────────────────────────────
bind = ,         Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT,    Print, exec, grim ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S).png

# ── mouse bindings ────────────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── window rules ──────────────────────────────────────────────────────────────
windowrulev2 = opacity 1.0 override, fullscreen:1
